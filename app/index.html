<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knock, your outreach agent</title>
  <meta name="description" content="Knock finds the right people, drafts the first line in your voice, and follows up until doors open." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='26' fill='%235e91bd'/><rect x='38' y='30' width='30' height='46' rx='6' fill='white'/><circle cx='61' cy='53' r='3.5' fill='%235e91bd'/><path d='M30 38q-8 4-9 13M35 30q-5 1-8 6' stroke='white' stroke-width='5' stroke-linecap='round' fill='none'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,400..900;1,400..900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="app.css?v=20260612-filters-tour" />
</head>
<body>

  <div class="shell">
    <!-- ============ SIDEBAR ============ -->
    <aside class="side">
      <a class="side__logo" href="../index.html">knock<span>.</span></a>

      <nav class="side__nav">
        <a href="#dashboard" data-route="dashboard" class="side__link is-active">
          <svg viewBox="0 0 24 24"><path d="M4 13h7V4H4zm0 7h7v-5H4zm9 0h7v-9h-7zm0-16v5h7V4z"/></svg>
          Dashboard
        </a>
        <a href="#inbox" data-route="inbox" class="side__link">
          <svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm0 12h-4a3 3 0 0 1-6 0H5V5h14z"/></svg>
          Inbox <span class="side__badge" id="inbox-badge" hidden>0</span>
        </a>
        <a href="#tracker" data-route="tracker" class="side__link">
          <svg viewBox="0 0 24 24"><path d="M3 5h6v14H3zm12 0h6v8h-6zM9 5h6v5H9z" transform="translate(0 0)"/></svg>
          Tracker
        </a>
        <div class="side__sep"></div>
        <a href="#profile" data-route="profile" class="side__link">
          <svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-3.34 0-10 1.67-10 5v3h20v-3c0-3.33-6.66-5-10-5z"/></svg>
          Profile
        </a>
        <a href="#settings" data-route="settings" class="side__link">
          <svg viewBox="0 0 24 24"><path d="M19.4 13a7.6 7.6 0 0 0 .06-1 7.6 7.6 0 0 0-.06-1l2.1-1.65a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.6-.22l-2.49 1a7.3 7.3 0 0 0-1.73-1l-.38-2.65A.5.5 0 0 0 13.93 2h-4a.5.5 0 0 0-.49.42l-.38 2.65a7.3 7.3 0 0 0-1.73 1l-2.49-1a.5.5 0 0 0-.6.22l-2 3.46a.5.5 0 0 0 .12.64L4.06 11a7.6 7.6 0 0 0-.06 1 7.6 7.6 0 0 0 .06 1l-2.1 1.65a.5.5 0 0 0-.12.64l2 3.46c.14.24.42.34.6.22l2.49-1a7.3 7.3 0 0 0 1.73 1l.38 2.65a.5.5 0 0 0 .49.42h4a.5.5 0 0 0 .49-.42l.38-2.65a7.3 7.3 0 0 0 1.73-1l2.49 1a.5.5 0 0 0 .6-.22l2-3.46a.5.5 0 0 0-.12-.64zM11.93 15.5a3.5 3.5 0 1 1 3.5-3.5 3.5 3.5 0 0 1-3.5 3.5z"/></svg>
          Settings
        </a>
      </nav>

      <div class="side__foot">
        <div class="knocks-card">
          <div class="knocks-card__row">
            <span>Knocks left</span>
            <strong id="knocks-left">15</strong>
          </div>
          <div class="knocks-card__bar"><div id="knocks-bar"></div></div>
          <span class="knocks-card__plan">Free plan · resets monthly</span>
          <button class="btn btn--paper btn--sm" id="upgrade-btn">Upgrade</button>
        </div>
        <button class="side__help" id="feedback-btn">Help &amp; feedback</button>
      </div>
    </aside>

    <!-- ============ MAIN ============ -->
    <div class="main">
      <header class="topbar">
        <div class="topbar__search">
          <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
          <input id="global-search" type="text" placeholder="Search, or press Enter to add a keyword filter…" />
        </div>
        <div class="topbar__right">
          <span class="topbar__streak" id="streak" title="Days in a row you've shown up"><i></i>1-day streak</span>
          <div class="acct" id="acct">
            <button class="topbar__avatar" id="acct-btn" aria-haspopup="true" aria-expanded="false">·</button>
            <div class="acct__menu" id="acct-menu" hidden>
              <div class="acct__who"><strong id="acct-name"></strong><small id="acct-email"></small></div>
              <a href="#profile">Profile</a>
              <a href="#settings">Settings</a>
              <button id="acct-tour">Take the tour</button>
              <button id="acct-logout">Log out</button>
            </div>
          </div>
        </div>
      </header>

      <main class="view" id="view"><!-- rendered by app.js --></main>
    </div>
  </div>

  <!-- ============ MODAL (onboarding / drafts / feedback / upgrade) ============ -->
  <div class="modal-scrim" id="modal-scrim" hidden>
    <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
  </div>

  <div class="toasts" id="toasts"></div>

  <script src="../vendor/supabase.js"></script>
  <script src="config.js" onerror="void 0"></script>
  <script src="auth.js?v=20260612-filters-tour"></script>
  <script src="app.js?v=20260612-filters-tour"></script>
</body>
</html>
